name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install glslang (shader compile gate)
        run: sudo apt-get update && sudo apt-get install -y glslang-tools

      - name: Language assets sync check
        run: pnpm language:check

      - name: Editor type-check + build
        run: pnpm build

      - name: Editor vitest suite (parser golden + layout + effects + playback + invariants + shaders + frontmatter)
        run: pnpm test

      - name: Parser regression
        run: pnpm test:parser

      - name: Playback regression
        run: pnpm --filter @kmd/editor test:playback

      - name: Runtime invariant guards
        run: pnpm --filter @kmd/editor test:invariants

      - name: Shader compile gate (glslangValidator)
        run: pnpm --filter @kmd/editor test:shaders

      - name: Reader runtime type-check
        run: pnpm reader:typecheck

      - name: Reader runtime build
        run: pnpm reader:build

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Reader runtime browser e2e
        run: pnpm test:e2e:run

      - name: Community API build
        run: pnpm community-api:build

      - name: Community API tests
        run: pnpm community-api:test
